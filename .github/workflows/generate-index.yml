name: Generate Miscellaneous Index
on:
  push:
    branches:
      - main
    paths:
      - '_pages/miscellaneous/**'
permissions:
  contents: write
jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Generate miscellaneous index
        run: |
          python3 << 'ENDPYTHON'
import os
import sys

TARGET_DIR = '_pages/miscellaneous'
OUTPUT_FILE = '_pages/miscellaneous.html'

# Collect HTML files
links = []
if os.path.isdir(TARGET_DIR):
    for filename in sorted(os.listdir(TARGET_DIR)):
        if filename.endswith('.html'):
            # Create URL and label
            url = f'/miscellaneous/{filename}'
            label = filename.replace('.html', '').replace('-', ' ').replace('_', ' ').title()
            links.append((url, label))
            print(f"Found: {filename} -> {label}")

# Write output file
with open(OUTPUT_FILE, 'w') as f:
    f.write('---\n')
    f.write('layout: default\n')
    f.write('title: "Miscellaneous"\n')
    f.write('permalink: /miscellaneous/\n')
    f.write('---\n')
    f.write('\n')
    f.write('<h1>Miscellaneous</h1>\n')
    f.write('<ul>\n')
    
    for url, label in links:
        f.write(f'  <li><a href="{url}">{label}</a></li>\n')
    
    f.write('</ul>\n')

print(f"\nGenerated {OUTPUT_FILE} with {len(links)} items")
ENDPYTHON
      
      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _pages/miscellaneous.html
          git diff --cached --quiet || (git commit -m "Update miscellaneous index [skip ci]" && git push)
